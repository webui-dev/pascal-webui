<!DOCTYPE html>
<html>
<head>
  <title>Hello World</title>
  <script src="/webui.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 24px;
      color: #333;
    }
    button {
      padding: 10px 24px;
      margin: 6px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #btn_greet { background: #4a90d9; color: #fff; }
    #btn_greet:hover { background: #357abd; }
    #btn_close { background: #e05c5c; color: #fff; }
    #btn_close:hover { background: #c0392b; }
    #message {
      margin-top: 24px;
      font-size: 1.1em;
      color: #555;
      min-height: 1.4em;
    }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
  <div>
    <button id="btn_greet">Say Hello</button>
    <button id="btn_close">Close</button>
  </div>
  <p id="message"></p>
</body>
</html>
